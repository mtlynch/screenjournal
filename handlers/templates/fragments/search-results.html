<ul class="py-0 my-0 list-unstyled border border-success">
  {{ range .Results -}}
    <li>
      {{ $nextUrl := "" }}
      {{ if eq .MediaType "movie" }}
        {{ $nextUrl = "/reviews/new/write" }}
      {{ else }}
        {{ $nextUrl = "/reviews/new/tv/pick-season" }}
      {{ end }}
      <a href="{{ $nextUrl }}?tmdbId={{ .TmdbID }}&mediaType={{ .MediaType }}"
        ><img src="{{ .PosterURL }}" /><span class="mx-3"
          >{{ .Title }} ({{ .ReleaseYear }})</span
        ></a
      >
    </li>
  {{ else -}}
    <li>No matches</li>
  {{- end }}
</ul>
